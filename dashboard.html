<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ระบบรับฟังความคิดเห็นนักศึกษา</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --dashboard-bg: #f8fafc;
            --primary-gradient: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
        }

        body {
            background: var(--dashboard-bg);
            color: #1e293b;
            font-family: 'Outfit', 'Noto Sans Thai', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            position: relative;
            z-index: 10;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dashboard-meta h1 {
            font-size: 2.75rem;
            color: #0f172a;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-meta p {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-back:hover {
            border-color: #2563eb;
            color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: var(--accent-color);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color, #2563eb);
            opacity: 0.3;
        }

        .stat-info .label {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .stat-info .value {
            color: #0f172a;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .stat-icon {
            position: absolute;
            right: 24px;
            bottom: 30px;
            font-size: 3rem;
            opacity: 0.08;
            filter: grayscale(1);
        }

        /* Charts Layout */
        .charts-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 24px;
            margin-bottom: 48px;
        }

        .chart-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .chart-card h3 {
            color: #0f172a;
            margin-bottom: 32px;
            font-weight: 800;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chart-container {
            position: relative;
            height: 320px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 850px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }
        }
    </style>
</head>

<body>
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <canvas id="particles-canvas"></canvas>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="dashboard-meta">
                <h1>ข้อมูลสรุปผล</h1>
                <p>ระบบวอยซ์ออฟสติวเดนท์ (Student Voice) | อัปเดตล่าสุด: <span id="last-update">-</span></p>
            </div>
            <a href="index.html" class="btn-back">
                <span>←</span> กลับไปหน้าแจ้งเรื่อง
            </a>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card" style="--accent-color: #3b82f6; animation-delay: 0.1s;">
                <div class="stat-info">
                    <span class="label">เรื่องร้องเรียนทั้งหมด</span>
                    <span class="value" id="total-count">0</span>
                </div>
                <div class="stat-icon">📩</div>
            </div>
            <div class="stat-card" style="--accent-color: #f59e0b; animation-delay: 0.2s;">
                <div class="stat-info">
                    <span class="label">รอดำเนินการ</span>
                    <span class="value" id="pending-count">0</span>
                </div>
                <div class="stat-icon">⏳</div>
            </div>
            <div class="stat-card" style="--accent-color: #10b981; animation-delay: 0.3s;">
                <div class="stat-info">
                    <span class="label">เสร็จสิ้นแล้ว</span>
                    <span class="value" id="done-count">0</span>
                </div>
                <div class="stat-icon">✅</div>
            </div>
            <!-- Removed Dept Count as it is unsupported by current stable backend -->
        </div>

        <!-- Charts Section -->
        <div class="charts-row">
            <div class="chart-card" style="animation: fadeInUp 0.8s ease backwards 0.5s;">
                <h3>📊 สถิติตามประเภทเรื่อง</h3>
                <div class="chart-container">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
            <div class="chart-card" style="animation: fadeInUp 0.8s ease backwards 0.6s;">
                <h3>📁 อัตราส่วนตามสถานะ</h3>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Particle effect is self-contained in dashboard.js -->
    <script src="dashboard.js"></script>
</body>

</html>
